name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Deployment and script tests
        run: bun run test:deploy

      - name: Contract tests
        run: bun run test:contracts

      - name: Webapp client tests
        run: bun run test:webapp

      - name: Backend tests
        run: bun run test:backend

      - name: Install Playwright browser
        run: bun run --cwd webapp e2e:install

      - name: Webapp E2E smoke
        run: bun run e2e:webapp
